services:

  mongo:
    image: mongo
    container_name: miro_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: miro_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: miro_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data: